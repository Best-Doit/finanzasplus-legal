<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanzasPlus – Control de finanzas personales</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e8eaf0;
      --text-muted: #8b90a8;
      --accent: #0ea5e9;
      --accent-soft: rgba(14,165,233,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: var(--accent-soft);
      border: 2px solid var(--accent);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--text-muted); font-size: 15px; margin-bottom: 40px; max-width: 400px; }
    .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    .btn {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn:hover { border-color: var(--accent); background: var(--accent-soft); }
    .btn .icon { font-size: 20px; margin-right: 10px; }
    .btn small { display: block; color: var(--text-muted); font-weight: 400; font-size: 12px; margin-top: 3px; }
    .footer { margin-top: 48px; color: var(--text-muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="logo-icon">💰</div>
  <h1>Finanzas<span>Plus</span></h1>
  <p class="sub">Controla lo que entra, lo que sale y lo que de verdad puedes gastar.</p>

  <div class="links">
    <a class="btn" href="./privacy-policy.html">
      <span class="icon">🔒</span>Política de Privacidad
      <small>Cómo protegemos y usamos tus datos</small>
    </a>
    <a class="btn" href="./terms.html">
      <span class="icon">📋</span>Términos de Uso
      <small>Condiciones de uso de la aplicación</small>
    </a>
  </div>

  <footer class="footer">
    © 2026 New Reboot · <a href="mailto:newrebootdev@gmail.com" style="color:var(--accent); text-decoration:none;">newrebootdev@gmail.com</a>
  </footer>
</body>
</html>
